[alembic]
script_location = alembic
# NOTE: This value is overridden at runtime by alembic/env.py, which reads
# DATABASE_URL from the environment (see app.core.config.settings).
# It is kept only as a fallback/default.
sqlalchemy.url = postgresql://revuser:changeme-local-only@db:5432/revision_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
