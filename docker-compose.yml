services:
  backend:
    image: ghcr.io/tosolini/revisioneprezzi/backend:main
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-revuser}:${POSTGRES_PASSWORD:-changeme-local-only}@db:5432/${POSTGRES_DB:-revision_db}
      - DEBUG=${DEBUG:-false}
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

  parser:
    image: ghcr.io/tosolini/revisioneprezzi/parser:main
    ports:
      - "127.0.0.1:8002:8002"

  db:
    image: postgres:16
    command:
      - postgres
      - -c
      - log_min_messages=warning
      - -c
      - log_min_error_statement=error
      - -c
      - log_statement=none
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-revuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-local-only}
      POSTGRES_DB: ${POSTGRES_DB:-revision_db}
    # Bind DB to localhost only so it is never reachable from the network.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
